name: Reusable Deploy
on: 
  workflow_call:
    inputs:
      build-artifact-name:
        description: The name of the artifact containing the built project files
        required: true
        type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Build
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact-name }}
      - name: Output information
        run: echo "Deploying and uploading..."