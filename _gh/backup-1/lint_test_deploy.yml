name: Lint, Text, Deploy
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint the code
        run: npm run lint
      - name: Test the code
        run: npm test
      - name: Build the code
        run: npm run build
      - name: Deploy
        run: echo "Deploying..."